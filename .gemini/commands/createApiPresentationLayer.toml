description = "Implements an api presentation layer that wraps around a module." 


prompt = '''
You will be making a new API presentation layer using express as described here - {{args}}

You need to strictly follow the rules of clean architecture. 

Your job is to: 

1. Create the contract models on the correct contract project. Put it on routes/api/v1. Follow the naming convention of {moduleName}Record and {moduleName}RecordInsertDTO. The first one is the model that represents the data as it is stored in the database, the second one is the model that represents the data that is sent by the client when creating a new record. The second one should not contain any fields that are generated by the database, such as id or created_at.

2. Create the contract routes on the correct contract project. Put it on models/v1. Follow the naming convention of {moduleName}. The route should contain the OpenApiSchemas for the request and response. The request should use the {moduleName}RecordInsertDTO as the body schema, and the response should use the {moduleName}Record as the schema for the 201 status code. You may use the following pre defined schemas: 
* **Models**
    * `file()`
    * `files()`
* **Response**
    * `empty()`
    * `boolean()`
    * `single(dataSchema)`
    * `list(dataSchema)`
    * `paginated(dataSchema)`
    * `error()`
    * `standardErrors()`
* **Request**
    * **Query**
        * `paginated()`
    * **Body**
        * `withPayload(dataSchema)`


3. Create the http controller on the correct api project. Put it on v1/routes. The controller should call the correct module use case and return the correct response. The controller should not contain any business logic, it should only be responsible for calling the use case and returning the response. Use import { createExpressController } from "@packages/typed-rest/serverExpress" to create the controller. The controller should be named {moduleName}Controller and should be in a file named {moduleName}.ts. The controller should be a class that has a method for each route that you created in step 2. The method should be named after the HTTP method and the route, for example if you have a POST route for creating a new record, the method should be named postCreate. 

4. Create the router for the http controller. Put it beside the http controller. The router should be named {moduleName}Router and should be in a file named {moduleName}.ts.

5. Load the router on the routes loader. The loader is on v1/loaders

6. Create a short and straight to the point summary of your changes.
'''